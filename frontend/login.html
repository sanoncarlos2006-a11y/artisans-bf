<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - Annuaire Artisans BF</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script defer src="assets/js/config.js"></script>
    <script defer src="assets/js/api.js"></script>
    <script defer src="assets/js/ui.js"></script>
    <script defer src="assets/js/auth.js"></script>
  </head>
  <body data-page="login">
    <header class="site-header">
      <nav class="nav" aria-label="Navigation principale">
        <a class="brand" href="index.html">
          <span class="brand-mark">BF</span>
          <span>Annuaire Artisans</span>
        </a>
        <div class="nav-links">
          <a href="index.html">Accueil</a>
          <a href="search.html">Recherche</a>
          <a href="register.html">Inscription</a>
        </div>
      </nav>
    </header>

    <main class="page page-narrow">
      <section class="auth-layout">
        <div class="panel auth-note">
          <div class="panel-body">
            <div class="page-title">
              <h1>Connexion artisan</h1>
              <p>
                Connecte-toi pour ajouter tes commerces, mettre une fiche en ligne
                ou la retirer le temps de corriger une information.
              </p>
            </div>
            <p class="muted">Pour essayer rapidement: +22670000000 / demo1234.</p>
            <div class="api-settings">
              <label class="field">
                <span>URL API FastAPI</span>
                <input data-api-base-url type="url">
              </label>
            </div>
          </div>
        </div>

        <form class="panel" data-login-form>
          <div class="panel-body search-form">
            <label class="field">
              <span>Telephone</span>
              <input name="phone" autocomplete="tel" required value="+22670000000">
            </label>
            <label class="field">
              <span>Mot de passe</span>
              <input name="password" type="password" autocomplete="current-password" required value="demo1234">
            </label>
            <button class="button" type="submit">Se connecter</button>
            <a class="button button-secondary" href="reset.html">Mot de passe oublie</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
