services:
  backend:
    image: python:3.11-slim
    container_name: artisans_bf_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: python:3.11-slim
    container_name: artisans_bf_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5500:5500"
    command: python -m http.server 5500 --bind 0.0.0.0
    depends_on:
      - backend
